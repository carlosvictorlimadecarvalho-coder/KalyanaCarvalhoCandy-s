<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolo Cocada</title>
    <link rel="stylesheet" href="../style info/style21.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap');
    </style>
</head>
<body>
    <div class="container" data-aos="flip-up">
<div class="card1">
    <h3 id="description"><b>• Ao Leite •</h2>
            <div class="ganacheChoco" data-aos="fade-down-left"></b></h3>
    <div class="carrosel">
        <div class="slider-container">
            <div class="swiper">
                <div class="swiper-wrapper">
                    <div class="swiper-slide">
                        <div class="slider">
                            <img src="../imagens/ganache1.jpeg">
                            
                        </div>
                        
                        <div class="slider">
                            <img src="../imagens/ganache2.jpeg">
                            
                        </div>
                    </div>

                    <div class="swiper-slide">
                        <div class="slider">
                            <img src="../imagens/ganache 3.jpeg">
                            
                        </div> 

                        <div class="slider">
                            <img src="../imagens/ganache4.jpeg">
                            
                        </div>
                    </div>
                </div>

                                <div class="swiper-button-next"></div>
                                <div class="swiper-button-prev"></div>
            </div>
        </div>
    </div>
    <button id="botao" onclick="window.location.replace('indexcard.html#decorados')">Voltar</button>
</div>
    <br><br><br><br><br>


<script src="../if.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
  new Swiper('.swiper', {
    navigation: {
      nextEl: '.swiper-button-next',
      prevEl: '.swiper-button-prev',
    },
    loop: true
  });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/ScrollTrigger.min.js"></script>

<script>
  gsap.registerPlugin(ScrollTrigger);
  
  gsap.to('.swiper-slide', {
    yPercent: -20, // move 20% para cima
    ease: "none",
    scrollTrigger: {
      trigger: '.carousel-container',
      scrub: 1, // vincula ao scroll
      start: "top center",
      end: "bottom center"
    }
  });
</script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!--Scripts AOS-->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
  AOS.init();
</script>
</body>
</html>
